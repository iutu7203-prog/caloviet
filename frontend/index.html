<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />

  <!-- PWA / App Store meta -->
  <meta name="theme-color" content="#15803d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="CaloViet" />
  <meta name="mobile-web-app-capable" content="yes" />

  <title>CaloViet</title>

  <!-- Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      background: #f0fdf4;
      font-family: 'Be Vietnam Pro', -apple-system, BlinkMacSystemFont, sans-serif;
      /* Safe area cho iPhone có notch / Dynamic Island */
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
      overscroll-behavior: none;
    }

    input, button, select, textarea {
      font-family: 'Be Vietnam Pro', -apple-system, sans-serif;
    }

    /* Tắt text selection trên mobile */
    * { -webkit-user-select: none; user-select: none; }
    input, textarea { -webkit-user-select: text; user-select: text; }

    /* Tắt bounce scroll trên iOS */
    html { overflow: hidden; height: 100%; }
    body { overflow: auto; height: 100%; }

    /* Splash screen */
    #splash {
      position: fixed; inset: 0; z-index: 9999;
      background: linear-gradient(160deg, #14532d, #16a34a, #22c55e);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      transition: opacity 0.5s ease;
    }
    #splash.fade-out { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>
  <!-- Splash screen -->
  <div id="splash">
    <div style="font-size:64px; margin-bottom:16px;">🥗</div>
    <div style="color:white; font-size:32px; font-weight:800; letter-spacing:-1px;">CaloViet</div>
    <div style="color:rgba(255,255,255,0.75); font-size:14px; margin-top:8px;">Theo dõi dinh dưỡng thông minh</div>
  </div>

  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    // Ẩn splash sau khi app load xong
    window.addEventListener('load', () => {
      setTimeout(() => {
        const s = document.getElementById('splash');
        if (s) { s.classList.add('fade-out'); setTimeout(() => s.remove(), 500); }
      }, 1200);
    });
  </script>
</body>
</html>
